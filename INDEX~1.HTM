const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const app = document.getElementById('app');
const money = n => n==null? '' : '$'+Number(n).toLocaleString('es-MX');

async function start(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ renderLogin(); } else { renderApp(); }
}
function renderLogin(){
  app.innerHTML = `
   <div style="padding:60px 24px 0;text-align:center">
     <img src="${LOGOS.V}" style="height:54px;margin-bottom:8px">
     <div class="disp" style="color:#2F8F96;font-size:15px;letter-spacing:.08em">Ateneo de Virreyes</div>
   </div>
   <div style="padding:28px 24px">
     <input id="em" placeholder="Email" value="concierge@virreyes.com">
     <input id="pw" type="password" placeholder="Contraseña" value="CasaPepe123">
     <button class="primary" id="go">Entrar</button>
     <div id="err" style="color:#B5472D;font-size:13px;margin-top:10px;text-align:center"></div>
   </div>`;
  document.getElementById('go').onclick = async ()=>{
    const email=document.getElementById('em').value, password=document.getElementById('pw').value;
    const { error } = await sb.auth.signInWithPassword({email,password});
    if(error){ document.getElementById('err').textContent = 'Email o contraseña incorrectos.'; }
    else renderApp();
  };
}
async function renderApp(){
  app.innerHTML = '<div style="padding:40px;text-align:center;color:#7a6a52">Cargando…</div>';
  const { data:prop } = await sb.from('properties').select('id').eq('nombre','Ateneo Virreyes').limit(1).single();
  const propId = prop ? prop.id : null;
  const { data:espacios } = await sb.from('espacios').select('*').eq('property_id', propId).order('tipo');
  const { data:exps } = await sb.from('experiencias').select('*').eq('destacado', true).order('destacado_orden');

  let espHtml = (espacios||[]).map(e=>{
    const foto = ESP_FOTO[e.tipo] || ESP_FOTO.coworking;
    const btn = e.activo ? `<button class="apartar" onclick="apartar('${e.id}','${(e.nombre||'').replace(/'/g,'')}')">Apartar</button>`
                         : `<div class="prox">Próximamente</div>`;
    return `<div class="esp" style="opacity:${e.activo?1:0.6}"><img class="im" src="${foto}">
      <div class="bd"><div style="font-size:13px;font-weight:700">${e.nombre||''}</div>
      <div style="font-size:10px;color:#7a6a52">${e.horario||e.duracion_slot||''}</div>${btn}</div></div>`;
  }).join('');

  let expHtml = (exps||[]).map(x=>{
    const foto = x.foto_url || ((x.nombre||'').toLowerCase().includes('mitos') ? MITOS_FOTO : '');
    const head = foto ? `<img class="im" src="${foto}">` : `<div class="im" style="background:#B5472D"></div>`;
    const meta = (x.rating? '★ '+x.rating+' · ':'') + money(x.pvp);
    const href = x.link_turitop || '#';
    return `<a class="exp" href="${href}" target="_blank">${head}
      <div class="tx"><div style="font-size:13px;font-weight:700">${x.nombre||''}</div>
      <div style="font-size:10px;opacity:.9">${meta}</div></div></a>`;
  }).join('');

  app.innerHTML = `
   <div style="padding:18px 16px 16px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #e2d5bf">
     <img src="${LOGOS.V}" style="height:50px"></div>
   <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 14px 4px">
     <div class="btn"><img src="${LOGOS.S}"><span>Tours y experiencias</span></div>
     <div class="btn"><img src="${LOGOS.C}" style="max-height:62px"><span>Cafetería · menú</span></div>
     <div class="btn"><img src="${LOGOS.V}" style="max-height:34px"><span>Hotel · info y servicios</span></div>

async function apartar(id,nombre){
  const { data:{ user } } = await sb.auth.getUser();
  const hoy = new Date().toISOString().slice(0,10);
  const { error } = await sb.from('reservas_espacio').insert({ espacio_id:id, user_id:user.id, fecha:hoy, estado:'solicitada' });
  alert(error ? ('No se pudo apartar: '+error.message) : ('¡Apartado! '+nombre+' (solicitud enviada)'));
}
async function salir(){ await sb.auth.signOut(); renderLogin(); }
start();
